<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaDoa - Entrar</title>
    <link rel="stylesheet" href="style.css"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="../img/icon_logo2.svg" alt="Logo EducaDoa" width="45" height="45">
            <h1 class="headerTitle">EducaDoa</h1>
        </div>
        <nav> 
            <a href="../pagina_principal/index.html">Inicio</a>
            <a href="./login.html">Entrar</a>
            <a href="../pagina_cadastro/cadastro.html">Cadastrar-se</a>
        </nav>
    </header>

    <main class="main-login">
        <div class="login-container">
            <h2>Acesse sua conta</h2>
            
            <form action="#" method="POST">
                
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <p class="cadastro-link">Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EducaDoa - Cornélio Procópio</p>
        <a href="https://simonr556.github.io/" target="_blank">Thiago Dutra da Silva</a>
        <br>
        <a href="https://duduaguiaarr-source.github.io/" target="_blank">Eduardo de Oliveira Aguiar</a>
        <br>
        <a href="https://nathanvictoroc.github.io/nathanvictor.github.io/" target="_blank">Nathan Victor de Oliveira Costa</a>
        <br>
    </footer>
</body>
</html>
